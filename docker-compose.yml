version: '3.8'

services:
  strapi:
    build: .
    container_name: strapi_cms
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres # Имя сервиса базы данных
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: nintendo27
      JWT_SECRET: bXlTdHJvbmdQYXNzd29yZDEyMzQ1Njc4OTBhYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3h5eg==
      ADMIN_JWT_SECRET: YWRtaW5TZWNyZXRLZXlQcm9kSldUMjAyNTEyMzQ1Njc4OTA=
      APP_KEYS: YXBwS2V5T25lLGFwcEtleVR3byxhcHBLZXlUaHJlZSxhcHBLZXlGb3Vy
    ports:
      - "1337:1337"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: strapi_db
      POSTGRES_USER: strapi_user
      POSTGRES_PASSWORD: strapi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Только для отладки, лучше не публиковать наружу
    restart: unless-stopped

volumes:
  postgres_data: